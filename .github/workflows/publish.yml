name: Publish

on:
    push:
        tags:
            - 'v[0-9]+.[0-9]+.[0-9]+'
    workflow_dispatch:

# Trusted Publishing (OIDC): npm recommends this instead of long-lived publish tokens + bypass 2FA.
permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  registry-url: https://registry.npmjs.org

            # Trusted Publishing (OIDC) requires npm CLI ≥ 11.5.1. Bundled npm on Node 22 is older → misleading E404 on publish.
            # Do NOT `npm install -g npm` over the runner toolchain (can MODULE_NOT_FOUND). Install npm 11 into its own prefix instead.
            - name: Use npm 11 for Trusted Publishing
              run: |
                  NPM_PREFIX="$RUNNER_TEMP/npm-publish-cli"
                  mkdir -p "$NPM_PREFIX"
                  npm install -g npm@11.14.0 --prefix "$NPM_PREFIX"
                  echo "$NPM_PREFIX/bin" >> "$GITHUB_PATH"
                  "$NPM_PREFIX/bin/npm" --version

            - name: Install dependencies (registry.npmjs.org)
              run: npm ci
              env:
                  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

            - name: Verify git tag matches package.json version
              if: github.ref_type == 'tag'
              run: |
                  PKG="$(node -p "require('./package.json').version")"
                  TAG="${GITHUB_REF_NAME#v}"
                  if [ "$PKG" != "$TAG" ]; then
                      echo "package.json version ($PKG) does not match tag v$TAG"
                      exit 1
                  fi

            - name: Build published artifacts
              run: npm run build

            # Uses GitHub OIDC when Trusted Publisher is configured on npmjs for this repo + publish.yml.
            - name: Publish to npm
              run: npm publish
