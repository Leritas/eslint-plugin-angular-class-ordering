name: Publish

on:
    push:
        tags:
            - 'v[0-9]+.[0-9]+.[0-9]+'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm

            - name: Require npm token
              run: |
                  if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
                      echo "::error::Add repository secret NPM_TOKEN (publish token for your registry)."
                      exit 1
                  fi
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Install dependencies (public npm)
              run: npm ci
              env:
                  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

            - name: Verify git tag matches package.json version
              if: github.ref_type == 'tag'
              run: |
                  PKG="$(node -p "require('./package.json').version")"
                  TAG="${GITHUB_REF_NAME#v}"
                  if [ "$PKG" != "$TAG" ]; then
                      echo "package.json version ($PKG) does not match tag v$TAG"
                      exit 1
                  fi

            - name: Configure npm for publish only
              run: |
                  set -euo pipefail
                  R="${NPM_REGISTRY_URL:-https://registry.npmjs.org/}"
                  HOST="$(node -e "console.log(new URL(process.argv[1]).host)" "$R")"
                  {
                      echo "registry=$R"
                      echo "always-auth=true"
                      echo "//${HOST}/:_authToken=${NODE_AUTH_TOKEN}"
                  } > .npmrc
              env:
                  NPM_REGISTRY_URL: ${{ secrets.NPM_REGISTRY_URL }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - run: npm publish
